# Маркеры для React Native
android.useAndroidX=true
android.enableJetifier=true

# Оптимизация памяти для сборки
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Включение/выключение новой архитектуры (по умолчанию выключена)
newArchEnabled=false

# ХАК: Указываем Gradle использовать встроенную Java из Android Studio
# Внимание: двойные слэши \\ здесь обязательны!
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr