name: Android Build Cloud

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Скачиваем код из репозитория
        uses: actions/checkout@v4

      - name: 2. Настраиваем Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Настраиваем Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 4. Устанавливаем NPM зависимости проекта
        run: npm install --legacy-peer-deps

      - name: 5. Настраиваем кэширование Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 6. Даем права на запуск сборщика gradlew
        run: chmod +x android/gradlew

      - name: 6.5 Исправляем конфигурацию gradle.properties (Java, Hermes и Память)
        run: |
          if [ -f android/gradle.properties ]; then
            # Удаляем виндовый путь к Java, чтобы Linux-сервер не ругался
            sed -i '/org.gradle.java.home/d' android/gradle.properties
            # Принудительно добавляем hermesEnabled, который так сильно ищет build.gradle
            echo "hermesEnabled=true" >> android/gradle.properties
            # Выделяем Gradle больше оперативной памяти, чтобы не было ошибки Java heap space
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> android/gradle.properties
          fi

      - name: 7. Запускаем компиляцию приложения (Генерация APK)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: 8. Сохраняем готовый APK файл для скачивания
        uses: actions/upload-artifact@v4
        with:
          name: CyberDarkApp-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7